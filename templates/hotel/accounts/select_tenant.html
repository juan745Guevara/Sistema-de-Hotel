<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegir hotel — Sistema Hotelero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">
    <div class="container" style="max-width: 480px;">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h1 class="h4 mb-3">Selecciona un hotel</h1>
                <p class="text-muted small mb-4">Tu usuario tiene acceso a varios hoteles. Elige con cuál trabajar ahora.</p>
                <form method="post" action="">
                    {% csrf_token %}
                    <div class="list-group mb-3">
                        {% for m in memberships %}
                            <label class="list-group-item d-flex gap-2 align-items-center">
                                <input class="form-check-input flex-shrink-0" type="radio" name="tenant_id" value="{{ m.tenant_id }}" required>
                                <span>
                                    <strong>{{ m.tenant.name }}</strong>
                                    <span class="d-block small text-muted">{{ m.get_role_display }}</span>
                                </span>
                            </label>
                        {% endfor %}
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Continuar</button>
                </form>
                <p class="mt-3 mb-0 text-center small">
                    <a href="{% url 'accounts_logout' %}">Cerrar sesión</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
