<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Sistema Hotelero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">
    <div class="container" style="max-width: 420px;">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h1 class="h4 mb-3">Iniciar sesión</h1>
                <p class="text-muted small mb-4">Accede al panel de tu hotel.</p>
                <p class="small text-secondary mb-3">
                    Usa el <strong>correo electrónico</strong> con el que te registraste, no el nombre del hotel.
                </p>
                <form method="post" action="">
                    {% csrf_token %}
                    {% if form.non_field_errors %}
                        <div class="alert alert-danger">{{ form.non_field_errors }}</div>
                    {% endif %}
                    <div class="mb-3">
                        <label class="form-label" for="id_username">Correo electrónico</label>
                        <input type="email" name="username" id="id_username" class="form-control" autocomplete="username" required autofocus placeholder="tu@correo.com" value="{{ form.username.value|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="id_password">Contraseña</label>
                        <input type="password" name="password" id="id_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Entrar</button>
                </form>
                <hr class="my-4">
                <p class="mb-0 text-center small text-muted">
                    ¿Nuevo? <a href="{% url 'accounts_signup' %}">Crear cuenta y hotel</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
